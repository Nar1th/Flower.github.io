<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Letter for Dalis 💌</title>
    <link rel="stylesheet" href="styles.css"
</head>
<body>

<div class="wrapper">
    <input type="checkbox" id="open">

    <label for="open" class="envelope">
        <div class="flap"></div>
        <div class="bottom"></div>

        <div class="letter">
            <h3>To: Dalis 💖</h3>
            <p>You are so beautiful.</p>
            <p>Every time I see you,</p>
            <p>my world stops ❤️</p>
        </div>
    </label>

    <div class="tap">Click the envelope 💌</div>
</div>

</body>
</html>
